<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дар — Кофейня</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #1e1e1e;
      color: #f0f0f0;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #ffcc00;
    }

    header p {
      font-size: 1.2rem;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #ffcc00;
      color: #1e1e1e;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #e6b800;
    }

    .menu {
      display: flex;
      justify-content: center;
      background-color: #2c2c2c;
      padding: 40px 20px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .menu-item {
      background-color: #3a3a3a;
      padding: 20px;
      border-radius: 10px;
      flex: 1 1 200px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .menu-item:hover {
      transform: scale(1.05);
    }

    .menu-item h3 {
      margin-bottom: 10px;
      color: #ffcc00;
    }

    .menu-item p {
      color: #ccc;
    }

    form {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      background-color: #3a3a3a;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    form input, form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      background-color: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 5px;
      resize: vertical;
    }

    form button {
      width: 100%;
      padding: 12px;
      background-color: #ffcc00;
      color: #1e1e1e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    form button:hover {
      background-color: #e6b800;
    }

    footer {
      background-color: #1e1e1e;
      padding: 30px 20px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2.2rem;
      }

      .menu {
        flex-direction: column;
        align-items: center;
      }

      form {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Дар</h1>
    <p>Кофейня, где каждая чашка — это дар</p>
    <button class="btn">Забронировать столик</button>
  </header>

  <section class="menu">
    <div class="menu-item">
      <h3>Кофе</h3>
      <p>Эспрессо, капучино, латте и другие варианты</p>
    </div>
    <div class="menu-item">
      <h3>Чай</h3>
      <p>Травяные, зелёные и чёрные чаи</p>
    </div>
    <div class="menu-item">
      <h3>Десерты</h3>
      <p>Торты, пирожные и выпечка</p>
    </div>
    <div class="menu-item">
      <h3>Сэндвичи</h3>
      <p>Свежие и вкусные, с разным начинанием</p>
    </div>
  </section>

  <section>
    <form>
      <input type="text" placeholder="Ваше имя" required />
      <input type="email" placeholder="Ваш email" required />
      <input type="number" placeholder="Количество гостей" required />
      <textarea rows="4" placeholder="Комментарий" required></textarea>
      <button type="submit">Отправить</button>
    </form>
  </section>

  <footer>
    <p>Дар — Кофейня | Улица Кофе, 123 | +7 (123) 456-78-90 | info@dar-coffee.ru</p>
  </footer>
</body>
</html>
